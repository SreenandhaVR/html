<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Sreenandha">
    <meta name="description" content="This is my first web page contains all th things I learned in HTML">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML TABLES Excercise</title>
    <style>
     table {
          border-collapse:collapse;
          border:2px solid rgb(12, 10, 10);
          font-family:Arial, Helvetica, sans-serif;
          margin:20px;
        }
        th, td {
          border:1px solid rgb(160 160 160);
          padding: 8px 10px;
        }
        caption{
          padding: 0 0 8px 8px;
        }
    </style>
    </head>
   <body>
      <table>
        <caption>
          Size Guide (inches)</caption>
        <tr>
        <th></th>
        <th>S</th>
        <th>M</th>
        <th>L</th>
        </tr>
        <tr>
          <th>Width</th>
          <td>20</td>
          <td>21</td>
          <td>22</td>
        </tr>
        <tr>
            <th>Length</th>
            <td>27</td>
            <td>28</td>
            <td>29</td>
        </tr>    
      </table>
    </body>
