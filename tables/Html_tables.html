<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Sreenandha">
    <meta name="description" content="This is my first web page contains all th things I learned in HTML">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML TABLES</title>
    <style>
     table {
          border-collapse:collapse;
          border:2px solid rgb(12, 10, 10);
          font-family:Arial, Helvetica, sans-serif;
          margin:20px;
        }
        th, td {
          border:1px solid rgb(160 160 160);
          padding: 8px 10px;
        }
        caption{
          padding: 0 0 8px 8px;
        }
    </style>
    </head>
    <body>
      <table>
        <caption>
          Caption for the table content
        </caption>
        <tr>
          <th></th>
          <th>Heading 1</th>
          <th>Heading 2</th>
        </tr>
        <tr>
          <th>Heading, row 2</th>
          <td>row2, column 1</td>
          <td>row2, column 2</td>
        </tr>
        <tr>
          <th>Heading, row 2</th>
          <td>row3, column 1</td>
          <td>row3, column 2</td>
        </tr>
      
      </table>
    </body>
